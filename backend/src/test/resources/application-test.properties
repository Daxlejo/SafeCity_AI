# =============================================
# PERFIL DE TEST
# Se activa con @ActiveProfiles("test") en los tests.
# =============================================

# BD H2 en memoria exclusiva para tests
spring.datasource.url=jdbc:h2:mem:safecity_test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Crear tablas automáticamente, sin consola H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# Desactivar logs de SQL en tests para no ensuciar la salida
spring.jpa.show-sql=false
