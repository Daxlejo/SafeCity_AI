# =============================================
# PERFIL DE DESARROLLO (dev)
# Este archivo solo se carga cuando
# spring.profiles.active=dev está activo.
# =============================================

# ================================
# Base de datos H2 en memoria
# ================================
# Usa una BD en memoria llamada "safecity_dev".
# Al apagar la app, los datos se pierden (ideal para desarrollo).
# No necesitas instalar nada ni conectarte a Supabase.
spring.datasource.url=jdbc:h2:mem:safecity_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ================================
# Consola web de H2
# ================================
# Habilita una interfaz web para ver/consultar la BD
# directamente desde el navegador.
# Accesible en: http://localhost:8080/api/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ================================
# JPA / Hibernate - Esquema automático
# ================================
# "create-drop" = cada vez que arrancas la app:
#   1. Borra todas las tablas existentes (DROP)
#   2. Crea las tablas nuevas según tus @Entity (CREATE)
# Perfecto para desarrollo, NUNCA usar en producción.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ================================
# Logs de SQL visibles
# ================================
# show-sql=true        → Imprime cada query SQL en consola
# format_sql=true      → Formatea el SQL bonito (indentado)
# use_sql_comments=true → Agrega comentarios indicando qué
#                         entidad generó la query
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Nivel de log DEBUG para ver los valores de los parámetros
# que se envían en cada query (los "?" del SQL)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
