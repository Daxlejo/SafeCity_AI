# ═══════════════════════════════════
# CONFIGURACIÓN BASE (todos los profiles)
# ═══════════════════════════════════

spring.application.name=SafeCity-Backend

# Profile activo. Render lo sobreescribe con la env var SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Puerto: Render asigna PORT dinámicamente. Default 8080 para local.
server.port=${PORT:8080}

# Forzar IPv4 — Supabase y Render pueden tener problemas con IPv6
spring.main.cloud-platform=none
spring.jpa.open-in-view=false

# ═══════════════════════════════════
# Swagger/OpenAPI
# ═══════════════════════════════════
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ═══════════════════════════════════
# Jackson (serialización JSON)
# ═══════════════════════════════════
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=America/Bogota

# ═══════════════════════════════════
# CORS — orígenes permitidos desde env vars
# ═══════════════════════════════════
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ═══════════════════════════════════
# Actuator — health check para Render
# ═══════════════════════════════════
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ═══════════════════════════════════
# File Upload — fotos de incidentes
# ═══════════════════════════════════
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}
